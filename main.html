<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>COFFEE</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="shortcut icon" href="img/bg.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      <img class="img__cap" src="img/cap.png" />
      <img class="bg__cap" src="img/background.png" />
